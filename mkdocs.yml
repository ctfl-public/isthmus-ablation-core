site_name: isthmus-ablation-core
site_description: Voxel ablation and coupling core for standalone and DSMC/SPARTA workflows.
repo_url: ""

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.details
  - pymdownx.superfences

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Concepts:
      - Architecture: concepts/architecture.md
      - Verification: concepts/verification.md
      - Expected Features: concepts/expected-features.md
  - Commands:
      - Command Reference: commands/index.md
      - Input Language Map: commands/language.md
      - include: commands/include.md
      - voxel: commands/voxel.md
      - source: commands/source.md
      - timestep: commands/timestep.md
      - loop commands: commands/loops.md
      - voxel ablate: commands/voxel-ablate.md
      - isthmus surface: commands/isthmus-surface.md
      - surface: commands/surface.md
      - grid write vtu: commands/grid-write-vtu.md
      - iac: commands/iac.md
      - stats and stats_style: commands/stats.md
      - voxel dump: commands/voxel-dump.md
      - verify: commands/verify.md
      - run: commands/run.md
  - Examples:
      - Direct Slab Ablation: examples/slab-direct.md
      - ISTHMUS Slab Ablation: examples/slab-isthmus.md
      - Sphere ISTHMUS Ablation: examples/sphere-isthmus.md
      - TIFF Sphere Example: examples/tiff-sphere.md
      - DSMC Sphere Kinetic Example: examples/dsmc-sphere-kinetic.md
      - DSMC Sphere Mass Flux Example: examples/dsmc-sphere-mass-flux.md
      - Pregen TIFF Carbon Recession: examples/pregen-tiff-carbon-recession.md
  - Development:
      - Directory Layout: development/directory-layout.md
      - Code Architecture: development/code-architecture.md
      - Build And Link: development/build-and-link.md
      - Testing: development/testing.md
      - Test Reports: development/test-reports.md
      - Documentation: development/documentation.md
